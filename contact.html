<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting — Om Kanabar</title>
    <script>
        // Extract current query parameters
        const currentParams = window.location.search;
        const baseRedirectUrl = "https://omkanabar.com/";
        let finalUrl = `${baseRedirectUrl}?contact`;

        if (currentParams) {
            const urlParams = new URLSearchParams(currentParams);
            if (urlParams.has("contact")) {
                finalUrl = baseRedirectUrl + currentParams;
            } else {
                finalUrl = `${baseRedirectUrl}?contact&${currentParams.substring(1)}`;
            }
        }

        // Execute the fast redirect
        window.location.replace(finalUrl);

        // Dynamic link injection fallback if the redirect pauses
        document.addEventListener("DOMContentLoaded", () => {
            const fallbackLink = document.getElementById("fallback-link");
            if (fallbackLink) {
                fallbackLink.href = finalUrl;
            }
        });
    </script>
</head>
<body style="background-color: #191919; color: #ede8dd; font-family: sans-serif;">
    
    <div style="margin-top: 40vh; text-align: center; padding: 0 1rem;">
        <p style="font-size: clamp(2rem, 5vw, 4rem); margin-bottom: 1rem; font-weight: 700;">
            Redirecting to contact form
        </p>
        
        <p style="font-size: 1rem; opacity: 0.6;">
            Taking too long? 
            <a id="fallback-link" href="https://omkanabar.com/?contact" style="color: #ffb300; text-decoration: underline; text-underline-offset: 4px;">
                Click here to jump over manually
            </a>.
        </p>
    </div>
</body>
</html>
