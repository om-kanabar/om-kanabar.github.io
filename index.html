<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Om Kanabar</title>
    <script src="js/index.js" defer></script>
    <link rel="stylesheet" href="css/index.css"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <link rel="icon" href="https://cdn.omkanabar.com/assets/branding/logos/DarkMainLogo.png" type="image/png" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cal+Sans&family=Lexend:wght@100..900&family=Poiret+One&family=Righteous&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/menlo" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/glacial-indifference-2" rel="stylesheet">
</head>
<body>
    <button class="hidden back-btn btn" id="back-btn"><i class="bi bi-arrow-left"></i></button>
    <div class="hidden" id="transition"></div>
    <div class="options hidden">
        <div class="photo">
            <div class="hero-container">
                <p class="hero om">om<span class="type-target"></span></p>
                <span class="label label-photo">photography</span>
            </div>
        </div>
        
        <div class="code">
            <div class="hero-container">
                <p class="hero kanabar"><span class="type-target"></span>kanabar</p>
                <span class="label label-code">code</span>
            </div>
        </div>
    </div>
    <div class="photo-body hidden body">
        <div class="nav">
            <div class="link-container">
                <a id="scene1btn" class="nav-item active" onclick="trans('scene1')">I</a>
                <p class="nav-separator">|</p>
                <a id="scene2btn" class="nav-item" onclick="trans('scene2')">II</a>
                <p class="nav-separator">|</p>
                <a id="scene3btn" class="nav-item" onclick="trans('scene3')">III</a>
            </div>
        </div>
        <div id="scene1" class="vertical-gallery-container scene pos-back"></div>
        <div id="scene2" class="vertical-gallery-container scene hidden pos-back"></div>
        <div id="scene3" class="vertical-gallery-container scene hidden pos-back"></div>
    </div>
    <div class="code-body hidden body">
    </div>
</body>
</html>
