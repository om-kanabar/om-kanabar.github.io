<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Page Not Found</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="https://cdn.omkanabar.com/assets/branding/logos/DarkMainLogo.png" type="image/png" />
</head>
<body class="code-body" style="overflow: hidden;">

    <div class="options position-relative d-flex align-items-center justify-content-center" style="min-height: 100vh;">
        
        <div class="position-absolute select-none pointer-events-none fw-bold" 
             style="font-family: var(--hero-font); font-size: 32vw; color: rgba(255, 255, 255, 0.02); line-height: 0.8; z-index: 0; left: -5vw; bottom: -5vh; user-select: none;">
            404
        </div>

        <div class="container position-relative px-4" style="z-index: 10; max-width: 900px;">
            <div class="row align-items-center gy-5">
                
                <div class="col-12 col-md-5 text-center text-md-start">
                    <span class="label label-code mb-2 text-uppercase" style="opacity: 0.5; letter-spacing: 0.3em;">Error Code</span>
                    <h1 class="hero m-0 p-0 mb-3" style="font-size: clamp(4rem, 8vw, 7rem); color: var(--white);">
                        404<span style="color: var(--yellow);">.</span>
                    </h1>
                    <p class="project-text mb-4 text-muted" style="font-family: var(--mono); font-size: 0.9rem;">
                        // page_not_found.js
                    </p>
                    <a href="index.html" class="btn btn-light px-4 py-2 rounded-pill label text-decoration-none">
                        &larr; return home
                    </a>
                </div>

                <div class="col-12 col-md-7">
                    <div class="p-4 p-lg-5 text-start" 
                         style="background: rgba(255, 255, 255, 0.03); border-left: 3px solid var(--yellow); border-radius: 0 12px 12px 0;">
                        
                        <blockquote class="blockquote m-0">
                            <p class="project-text fs-5 mb-4" style="line-height: 1.7; color: var(--white); font-style: italic;">
                                "If debugging is the process of removing software bugs, then programming must be the process of putting them in."
                            </p>
                        </blockquote>
                        
                        <div class="d-flex align-items-center justify-content-between pt-3" style="border-top: 1px solid rgba(255,255,255,0.08);">
                            <span class="label label-code fs-7 m-0" style="opacity: 0.6;">
                                &mdash; Edsger W. Dijkstra
                            </span>
                            <span class="label fs-7 text-muted" style="font-family: var(--mono); opacity: 1;">
                                [index: null]
                            </span>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
</body>
</html>
